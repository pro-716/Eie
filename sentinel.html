<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>716 SENTINEL | فحص الثغرات</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05060f; --surface: #0b0d1a; --accent: #f43f5e; --text: #e8eaf6; }
        body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans Arabic', sans-serif; padding: 2rem; }
        .nav-back { margin-bottom: 2rem; }
        .nav-back a { color: var(--accent); text-decoration: none; font-weight: 600; }
        .panel { background: var(--surface); padding: 2rem; border-radius: 1rem; border: 1px solid rgba(255,255,255,0.05); max-width: 900px; margin: 0 auto; }
        .scanner-box { background: #0f1120; border: 1px dashed var(--accent); padding: 2rem; text-align: center; border-radius: 1rem; cursor: pointer; }
        #results { margin-top: 2rem; }
        .vuln-item { background: rgba(244,63,94,0.1); border-right: 4px solid var(--accent); padding: 1rem; margin-bottom: 1rem; border-radius: 0.4rem; }
    </style>
</head>
<body>
    <div class="nav-back"><a href="index.html">← العودة للرئيسية</a></div>
    <div class="panel">
        <h2>716 SENTINEL - كاشف الثغرات</h2>
        <div class="scanner-box" onclick="startScan()">
            اضغط هنا لبدء فحص الكود البرمجي
        </div>
        <div id="results"></div>
        <button id="exportBtn" style="display:none; background:var(--accent); color:white; border:none; padding:10px 20px; border-radius:5px; margin-top:10px;" onclick="exportReport()">تحميل تقرير CVE</button>
    </div>

    <script>
        function startScan() {
            const res = document.getElementById('results');
            res.innerHTML = '<p>جاري تحليل الأنماط...</p>';
            setTimeout(() => {
                res.innerHTML = `
                    <div class="vuln-item">
                        <strong>ثغرة مكتشفة: SQL Injection</strong><br>
                        <small>الخطورة: عالية | الموقع: Line 42</small>
                    </div>
                    <div class="vuln-item">
                        <strong>ثغرة مكتشفة: XSS Attack</strong><br>
                        <small>الخطورة: متوسطة | الموقع: Input Field</small>
                    </div>
                `;
                document.getElementById('exportBtn').style.display = 'block';
            }, 1500);
        }

        function exportReport() {
            const report = "716 SENTINEL SECURITY REPORT\nDate: " + new Date().toLocaleDateString() + "\nFound 2 Vulnerabilities.";
            const blob = new Blob([report], {type: 'text/plain'});
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'Security_Report.txt';
            a.click();
        }
    </script>
</body>
</html>
